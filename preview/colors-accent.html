<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_preview.css"></head>
<body>
<div class="col" style="gap:12px">
  <div class="row" style="gap:14px">
    <div style="width:80px;height:80px;border-radius:8px;background:#1f1f1f;border:1px solid var(--border)"></div>
    <div class="col" style="gap:4px">
      <div class="label-eyebrow">Accent</div>
      <div style="font-size:16px;font-weight:600;letter-spacing:-0.015em">Mono / near-black</div>
      <div class="label-mono" style="color:var(--fg-subtle)">#1f1f1f · var(--accent)</div>
      <div style="font-size:11.5px;color:var(--fg-subtle);max-width:280px;line-height:1.4">Used sparingly — primary actions, active nav, the single most important number in a chart.</div>
    </div>
  </div>
  <div class="divider"></div>
  <div class="row" style="gap:8px">
    <button style="background:#1f1f1f;color:#fff;border:0;padding:7px 12px;height:32px;border-radius:6px;font-family:var(--font-sans);font-size:13.5px;font-weight:500">Primary action</button>
    <span style="display:inline-flex;align-items:center;gap:6px;padding:4px 8px;background:transparent;color:#1f1f1f;font-size:12.5px;font-weight:500">Active nav →</span>
    <span style="display:inline-block;width:18px;height:18px;border-radius:6px;background:#1f1f1f"></span>
    <span class="label-mono" style="color:var(--fg-subtle)">Brand mark</span>
  </div>
</div>
</body></html>
