<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_preview.css"></head>
<body>
<div class="col" style="gap:10px">
  <div class="label-eyebrow">Semantic state</div>
  <div class="row" style="gap:10px">
    <span style="display:inline-flex;align-items:center;gap:6px;background:oklch(0.96 0.02 150);color:oklch(0.55 0.10 150);font-size:11.5px;font-weight:500;padding:2px 8px;border-radius:999px"><span style="width:5px;height:5px;border-radius:999px;background:currentColor"></span>Positive</span>
    <span style="display:inline-flex;align-items:center;gap:6px;background:oklch(0.96 0.02 25);color:oklch(0.55 0.14 25);font-size:11.5px;font-weight:500;padding:2px 8px;border-radius:999px"><span style="width:5px;height:5px;border-radius:999px;background:currentColor"></span>Negative</span>
    <span style="display:inline-flex;align-items:center;gap:6px;background:oklch(0.96 0.02 80);color:oklch(0.65 0.10 80);font-size:11.5px;font-weight:500;padding:2px 8px;border-radius:999px"><span style="width:5px;height:5px;border-radius:999px;background:currentColor"></span>Warning</span>
    <span style="display:inline-flex;align-items:center;gap:6px;background:oklch(0.96 0.02 240);color:oklch(0.55 0.08 240);font-size:11.5px;font-weight:500;padding:2px 8px;border-radius:999px"><span style="width:5px;height:5px;border-radius:999px;background:currentColor"></span>Info</span>
    <span style="display:inline-flex;align-items:center;gap:6px;background:#f5f5f4;color:#57534e;font-size:11.5px;font-weight:500;padding:2px 8px;border-radius:999px;border:1px solid #e7e5e4">Neutral</span>
  </div>
  <div class="divider"></div>
  <div class="row" style="gap:10px;align-items:center">
    <span style="color:oklch(0.55 0.10 150);font-weight:500;font-size:13px;font-variant-numeric:tabular-nums">+12.4%</span>
    <span style="color:oklch(0.55 0.14 25);font-weight:500;font-size:13px;font-variant-numeric:tabular-nums">−3.2%</span>
    <span class="label-mono" style="color:var(--fg-subtle)">delta text · tabular-nums</span>
  </div>
</div>
</body></html>
