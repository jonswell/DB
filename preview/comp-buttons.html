<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_preview.css"></head>
<body>
<div class="col" style="gap:12px">
  <div class="label-eyebrow">Buttons</div>

    <button style="background:#fff;color:#1f1f1f;border:1px solid #d6d3d1;padding:7px 12px;height:32px;border-radius:6px;font-family:inherit;font-size:13.5px;font-weight:500">Secondary</button>

    <button style="background:#1f1f1f;color:#fff;border:0;padding:5px 10px;height:26px;border-radius:6px;font-family:inherit;font-size:12.5px;font-weight:500">Small</button>
    <button style="background:#1f1f1f;color:#fff;border:0;padding:7px 12px;height:32px;border-radius:6px;font-family:inherit;font-size:13.5px;font-weight:500">Medium</button>
    <button style="background:#1f1f1f;color:#fff;border:0;padding:10px 16px;height:38px;border-radius:8px;font-family:inherit;font-size:14.5px;font-weight:500">Large</button>
