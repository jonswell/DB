<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_preview.css"></head>
<body>
<div class="col" style="gap:14px">
  <div class="label-eyebrow">Inputs & search</div>
  <div style="display:flex;align-items:center;gap:8px;background:#fff;border:1px solid #e7e5e4;border-radius:6px;padding:0 10px;max-width:360px;height:32px">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#a8a29e" stroke-width="1.5" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><path d="m20 20-3.5-3.5"/></svg>
    <input placeholder="Search anything…" style="border:0;outline:0;flex:1;font-family:inherit;font-size:13.5px;height:30px;color:#1f1f1f;background:transparent" />
    <span style="font-family:var(--font-mono);font-size:10px;color:#a8a29e">⌘K</span>
  </div>
  <div style="display:flex;align-items:center;gap:8px;background:#fff;border:1px solid #1f1f1f;border-radius:6px;padding:0 10px;max-width:300px;height:32px">
    <input value="hello@acme.co" style="border:0;outline:0;flex:1;font-family:inherit;font-size:13.5px;height:30px;color:#1f1f1f;background:transparent" />
  </div>
  <div class="row" style="gap:8px;align-items:center">
    <div style="display:inline-flex;padding:2px;background:#f5f5f4;border-radius:6px;gap:2px">
      <button style="background:#fff;color:#1f1f1f;border:0;border-radius:4px;font-family:inherit;font-size:11.5px;font-weight:500;padding:0 10px;height:22px;box-shadow:0 1px 0 rgba(15,15,15,0.03)">24h</button>
      <button style="background:transparent;color:#78716c;border:0;border-radius:4px;font-family:inherit;font-size:11.5px;font-weight:500;padding:0 10px;height:22px">7d</button>
      <button style="background:transparent;color:#78716c;border:0;border-radius:4px;font-family:inherit;font-size:11.5px;font-weight:500;padding:0 10px;height:22px">30d</button>
      <button style="background:transparent;color:#78716c;border:0;border-radius:4px;font-family:inherit;font-size:11.5px;font-weight:500;padding:0 10px;height:22px">QTD</button>
    </div>
    <span class="label-mono" style="color:var(--fg-subtle)">Segmented</span>
  </div>
</div>
